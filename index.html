    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #EFF4FF; }
    ::-webkit-scrollbar-thumb { background: #93B4F0; border-radius: 3px; }
    textarea { font-family: inherit; }
    input[type=range] { accent-color: #1E3A8A; }

    /* ── Mobile overlay sidebar ── */
    .sidebar-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 99;
    }
    .sidebar-overlay.open { display: block; }

    .sidebar-drawer {
      position: fixed;
      top: 0; right: 0;
      height: 100vh;
      width: 220px;
      z-index: 100;
      transform: translateX(100%);
      transition: transform .25s ease;
      overflow-y: auto;
    }
    .sidebar-drawer.open { transform: translateX(0); }

    /* hamburger top bar — mobile only */
    .mob-topbar {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #1E3A8A;
      color: white;
      font-weight: 800;
      font-size: 15px;
      position: sticky; top: 0; z-index: 50;
    }
    .mob-topbar button {
      background: none; border: none; color: white;
      font-size: 22px; cursor: pointer; line-height: 1;
    }

    @media (max-width: 640px) {
      .desktop-sidebar { display: none !important; }
      .mob-topbar      { display: flex !important; }

    // ─── PERSONALIZATION HELPER ──────────────────────────────────────────────
    function getUserContext(user) {
      const spec = user?.spec || "";
      const role = user?.role || "student";
      const isFirstYear  = spec.includes("الأولى") || spec.includes("مشترك");
      const isSecondYear = spec.includes("الثانية");
      const isLicence    = spec.includes("ليسانس");
      const isMaster     = spec.includes("ماستر");
      const isPhd        = spec.includes("دكتوراه");
      const isTeacher    = role === "teacher";
      const hasMaliya    = spec.includes("مالي") || spec.includes("محاسبة"); // "مالي" يغطي مالية ومالي ونقدي ومالي
      const hasEco       = spec.includes("اقتصاد");
      const hasTasjir    = spec.includes("تسيير") || spec.includes("إدارة") || spec.includes("موارد بشرية");

      let bookFilter = "الكل";
      if (hasMaliya) bookFilter = "إدارة مالية";
      else if (hasTasjir) bookFilter = "علوم التسيير";
      else if (hasEco) bookFilter = "الكل"; // طلاب الاقتصاد يرون كل الكتب

      let levelFilter = "الكل";
      if (isFirstYear || isSecondYear || isLicence) levelFilter = "ليسانس";
      else if (isMaster || isPhd) levelFilter = "ماستر";

      let suggestedServices = [];
      if (isFirstYear || isSecondYear)
        suggestedServices = ["questions","books","why","search"];
      else if (isLicence)
        suggestedServices = ["questions","theses","refs","guide","books"];
      else if (isMaster)
        suggestedServices = ["guide","refs","session","theses","triple"];
      else if (isPhd)
        suggestedServices = ["guide","session","refs","triple","theses"];
      else if (isTeacher)
        suggestedServices = ["triple","proofread","refs","translate","ai"];
      else
        suggestedServices = ["triple","questions","books","refs","guide"];

      return { isFirstYear, isSecondYear, isLicence, isMaster, isPhd, isTeacher,
               hasMaliya, hasEco, hasTasjir, bookFilter, levelFilter,
               suggestedServices, spec, role };
    }

        gray:   { bg: C.border,     color: C.muted },

        { id: "مالية",   label: "🟡 العلوم المالية والمحاسبة",    specs: ["محاسبة وجباية","محاسبة ومالية","مالية المؤسسة","مالية وأنظمة محاسبة","المالية العامة والتشريع المالي الضريبي"] },
        { id: "اقتصاد",  label: "🟢 العلوم الاقتصادية",          specs: ["اقتصاد دولي","اقتصاد نقدي وبنكي","اقتصاد وتسيير المؤسسات","تحليل اقتصادي واستشراف"] },
      ];
      const currentPhdSpecs = phdBranches.find(b => b.id === phdBranch)?.specs || [];

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      const getUsers = () => JSON.parse(localStorage.getItem("rafiq_users") || "{}");
      const saveUsers = (u) => localStorage.setItem("rafiq_users", JSON.stringify(u));

      const handleLogin = () => {
        if (!email.trim() || !pass.trim()) { setErr("يرجى تعبئة جميع الحقول"); return; }
        if (!emailRegex.test(email.trim())) { setErr("صيغة البريد الإلكتروني غير صحيحة"); return; }
        const users = getUsers();
        const user = users[email.toLowerCase().trim()];
        if (!user) { setErr("هذا الحساب غير موجود — سجّل أولاً"); return; }
        if (user.pass !== pass) { setErr("كلمة المرور غير صحيحة"); return; }
        setErr(""); onLogin({ name: user.name, spec: user.spec, role: user.role, email: email.toLowerCase().trim() });
      };

      const handleRegister = () => {
        if (!userType) { setErr("يرجى اختيار نوع الحساب"); return; }
        if (!name.trim() || !email.trim() || !pass.trim()) { setErr("يرجى تعبئة جميع الحقول"); return; }
        if (!emailRegex.test(email.trim())) { setErr("صيغة البريد الإلكتروني غير صحيحة"); return; }
        if (!isUnivEmail(email)) { setErr("يُقبل الإيميل الجامعي فقط — مثال: nom@univ-jijel.dz"); return; }
        if (pass.length < 6) { setErr("كلمة المرور يجب أن تكون 6 أحرف على الأقل"); return; }
        if (pass !== passConf) { setErr("كلمة المرور وتأكيدها غير متطابقتان"); return; }
        if (userType === "student") {
          if (!studentLevel) { setErr("يرجى اختيار المرحلة الدراسية"); return; }
          if (studentLevel !== "phd" && !spec) { setErr("يرجى اختيار المسار الدراسي"); return; }
          if (studentLevel === "phd" && (!phdBranch || !phdSpec || !phdYear)) { setErr("يرجى تعبئة الشعبة والتخصص وسنة الدكتوراه"); return; }
        }
        if (userType === "teacher" && (!grade || !dept)) { setErr("يرجى تعبئة الرتبة والقسم"); return; }
        const users = getUsers();
        if (users[email.toLowerCase().trim()]) { setErr("هذا البريد الإلكتروني مسجّل مسبقاً — ادخل مباشرة"); return; }
        let specLabel = "";
        if (userType === "student") {
          if (studentLevel === "phd") specLabel = `دكتوراه — ${phdBranches.find(b=>b.id===phdBranch)?.label?.replace(/^[🔴🔵🟡🟢]\s*/,"")} — ${phdSpec} (السنة ${phdYear})`;
          else specLabel = spec;
        } else {
          specLabel = `${grade} — ${dept}`;
        }
        const userData = { name: name.trim(), pass, role: userType, studentLevel, spec: specLabel, grade: grade || null };
        users[email.toLowerCase().trim()] = userData;
        saveUsers(users);
        setErr(""); onLogin({ name: userData.name, spec: userData.spec, role: userType, email: email.toLowerCase().trim() });
      };

      return (
        <div style={{ minHeight: "100vh", background: `linear-gradient(135deg, #1E3A8A 0%, #1D4ED8 50%, #3B82F6 100%)`, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
          <div style={{ background: C.card, border: `1.5px solid ${C.border}`, borderRadius: 24, padding: "36px 32px", width: "100%", maxWidth: 400, boxShadow: "0 20px 60px rgba(30,58,138,.25)" }}>

            {/* Logo */}
            <div style={{ textAlign: "center", marginBottom: 24 }}>
              <div style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 64, height: 64, background: C.primary, borderRadius: 18, fontSize: 28, marginBottom: 12, boxShadow: "0 8px 20px rgba(30,58,138,.3)" }}>🎓</div>
              <h1 style={{ fontSize: 22, fontWeight: 800, color: C.primary, margin: "0 0 4px" }}>رفيق الطالب</h1>
              <p style={{ fontSize: 12, color: C.muted, margin: 0 }}>كلية العلوم الاقتصادية والتجارية وعلوم التسيير</p>
            </div>

            {/* Tabs */}
            <div style={{ display: "flex", background: C.bg, borderRadius: 10, padding: 3, marginBottom: 22 }}>
              {[{ id: "login", label: "دخول" }, { id: "register", label: "حساب جديد" }].map(t => (
                <button key={t.id} onClick={() => { setScreen(t.id); setErr(""); }} style={{
                  flex: 1, padding: "8px 0", borderRadius: 8, border: "none", cursor: "pointer",
                  fontFamily: "inherit", fontSize: 13, fontWeight: 700,
                  background: screen === t.id ? C.primary : "transparent",
                  color: screen === t.id ? "white" : C.muted,
                  transition: "all .2s",
                }}>{t.label}</button>
              ))}
            </div>

            {screen === "login" ? (
              /* ── شاشة الدخول ── */
              <div>
                <div style={{ marginBottom: 14 }}>
                  <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: C.text, marginBottom: 5 }}>البريد الجامعي</label>
                  <input value={email} onChange={e => setEmail(e.target.value)} placeholder="nom.prenom@univ-jijel.dz" style={inp} />
                </div>
                <div style={{ marginBottom: 20 }}>
                  <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: C.text, marginBottom: 5 }}>كلمة المرور</label>
                  <input type="password" value={pass} onChange={e => setPass(e.target.value)} onKeyDown={e => e.key === "Enter" && handleLogin()} placeholder="••••••••" style={inp} />
                </div>
                {err && <div style={{ color: C.red, fontSize: 12, marginBottom: 10, textAlign: "center" }}>{err}</div>}
                <button onClick={handleLogin} style={{ ...btn(), width: "100%", padding: 13, fontSize: 15, background: `linear-gradient(135deg, ${C.primary} 0%, #1D4ED8 100%)`, boxShadow: "0 4px 15px rgba(30,58,138,.3)" }}>دخول ←</button>
              </div>
            ) : (
              /* ── شاشة التسجيل ── */
              <div>
                {/* الخطوة 1: اختيار نوع الحساب */}
                <div style={{ marginBottom: 14 }}>
                  <label style={{ display: "block", fontSize: 13, fontWeight: 700, color: C.text, marginBottom: 8 }}>نوع الحساب</label>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                    {[
                      { id: "student", icon: "🎓", label: "طالب" },
                      { id: "teacher", icon: "👨‍🏫", label: "أستاذ" },
                    ].map(t => (
                      <button key={t.id} onClick={() => { setUserType(t.id); setStudentLevel(""); setSpec(""); setPhdBranch(""); setPhdSpec(""); setPhdYear(""); setErr(""); }} style={{
                        padding: "12px 6px", borderRadius: 10, border: `2px solid ${userType === t.id ? C.primary : C.border}`,
                        background: userType === t.id ? C.lightGreen : C.bg,
                        color: userType === t.id ? C.primary : C.muted,
                        fontFamily: "inherit", fontSize: 13, fontWeight: 700, cursor: "pointer",
                        display: "flex", flexDirection: "column", alignItems: "center", gap: 4,
                        transition: "all .15s",
                      }}>
                        <span style={{ fontSize: 22 }}>{t.icon}</span>{t.label}
                      </button>
                    ))}
                  </div>
                </div>

                {/* الحقول المشتركة */}
                {userType && (<>
                  <div style={{ marginBottom: 11 }}>
                    <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: C.text, marginBottom: 5 }}>

                    <div style={{ fontSize: 11, color: C.muted, marginTop: 4 }}>يُقبل الإيميل الجامعي فقط (@univ-…dz)</div>
                  </div>

                  {/* حقول الطالب — 3 مراحل */}
                  {userType === "student" && (
                    <div style={{ marginBottom: 11 }}>
                      <label style={{ display: "block", fontSize: 13, fontWeight: 700, color: C.text, marginBottom: 8 }}>المرحلة الدراسية</label>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 7, marginBottom: studentLevel ? 12 : 0 }}>
                        {[
                          { id: "licence", icon: "📘", label: "ليسانس" },
                          { id: "master",  icon: "📗", label: "ماستر" },
                          { id: "phd",     icon: "🔬", label: "دكتوراه" },
                        ].map(lv => (
                          <button key={lv.id} onClick={() => { setStudentLevel(lv.id); setSpec(""); setPhdBranch(""); setPhdSpec(""); setPhdYear(""); setErr(""); }} style={{
                            padding: "9px 4px", borderRadius: 9, border: `2px solid ${studentLevel === lv.id ? C.primary : C.border}`,
                            background: studentLevel === lv.id ? C.lightGreen : C.bg,
                            color: studentLevel === lv.id ? C.primary : C.muted,
                            fontFamily: "inherit", fontSize: 11, fontWeight: 700, cursor: "pointer",
                            display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
                            transition: "all .15s",
                          }}>
                            <span style={{ fontSize: 18 }}>{lv.icon}</span>{lv.label}
                          </button>
                        ))}
                      </div>

                      {/* ليسانس */}
                      {studentLevel === "licence" && (
                        <select value={spec} onChange={e => setSpec(e.target.value)} style={{ ...inp, appearance: "auto" }}>
                          <option value="">اختر مسارك</option>
                          <option value="السنة الأولى — مشترك">السنة الأولى — مشترك</option>
                          <option value="السنة الثانية — علوم التسيير">السنة الثانية — علوم التسيير</option>
                          <option value="السنة الثانية — علوم تجارية">السنة الثانية — علوم تجارية</option>
                          <option value="السنة الثانية — علوم مالية ومحاسبة">السنة الثانية — علوم مالية ومحاسبة</option>
                          <option value="السنة الثانية — علوم اقتصادية">السنة الثانية — علوم اقتصادية</option>
                          <option value="ليسانس 3 — إدارة مالية">ليسانس 3 — إدارة مالية</option>
                          <option value="ليسانس 3 — إدارة الأعمال">ليسانس 3 — إدارة الأعمال</option>
                          <option value="ليسانس 3 — إدارة الموارد البشرية">ليسانس 3 — إدارة الموارد البشرية</option>
                          <option value="ليسانس 3 — مالية وتجارة دولية">ليسانس 3 — مالية وتجارة دولية</option>
                          <option value="ليسانس 3 — تسويق">ليسانس 3 — تسويق</option>
                          <option value="ليسانس 3 — مالية">ليسانس 3 — مالية</option>
                          <option value="ليسانس 3 — محاسبة">ليسانس 3 — محاسبة</option>
                          <option value="ليسانس 3 — اقتصاد نقدي ومالي">ليسانس 3 — اقتصاد نقدي ومالي</option>
                        </select>
                      )}

                      {/* ماستر */}
                      {studentLevel === "master" && (
                        <select value={spec} onChange={e => setSpec(e.target.value)} style={{ ...inp, appearance: "auto" }}>
                          <option value="">اختر تخصصك</option>
                          <option value="ماستر 1 — إدارة مالية">ماستر 1 — إدارة مالية</option>
                          <option value="ماستر 1 — إدارة موارد بشرية">ماستر 1 — إدارة موارد بشرية</option>
                          <option value="ماستر 1 — تسيير مالي للمؤسسات (مهني)">ماستر 1 — تسيير مالي للمؤسسات (مهني)</option>
                          <option value="ماستر 1 — إدارة الأعمال">ماستر 1 — إدارة الأعمال</option>
                          <option value="ماستر 1 — تسويق الخدمات">ماستر 1 — تسويق الخدمات</option>
                          <option value="ماستر 1 — تسويق فندقي وسياحي">ماستر 1 — تسويق فندقي وسياحي</option>
                          <option value="ماستر 1 — محاسبة وجباية">ماستر 1 — محاسبة وجباية</option>
                          <option value="ماستر 1 — مالية مؤسسة">ماستر 1 — مالية مؤسسة</option>
                          <option value="ماستر 1 — اقتصاد دولي">ماستر 1 — اقتصاد دولي</option>
                          <option value="ماستر 1 — اقتصاد نقدي ومالي">ماستر 1 — اقتصاد نقدي ومالي</option>
                          <option value="ماستر 2 — إدارة مالية">ماستر 2 — إدارة مالية</option>
                          <option value="ماستر 2 — إدارة موارد بشرية">ماستر 2 — إدارة موارد بشرية</option>
                          <option value="ماستر 2 — تسيير مالي للمؤسسات">ماستر 2 — تسيير مالي للمؤسسات</option>
                          <option value="ماستر 2 — تسويق الخدمات">ماستر 2 — تسويق الخدمات</option>
                          <option value="ماستر 2 — محاسبة وجباية">ماستر 2 — محاسبة وجباية</option>
                          <option value="ماستر 2 — اقتصاد دولي">ماستر 2 — اقتصاد دولي</option>
                          <option value="ماستر 2 — اقتصاد نقدي ومالي">ماستر 2 — اقتصاد نقدي ومالي</option>
                        </select>
                      )}

                      {/* دكتوراه */}
                      {studentLevel === "phd" && (
                        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                          {/* الشعبة */}
                          <select value={phdBranch} onChange={e => { setPhdBranch(e.target.value); setPhdSpec(""); }} style={{ ...inp, appearance: "auto" }}>
                            <option value="">اختر الشعبة</option>
                            {phdBranches.map(b => <option key={b.id} value={b.id}>{b.label}</option>)}
                          </select>
                          {/* التخصص — يظهر بعد اختيار الشعبة */}
                          {phdBranch && (
                            <select value={phdSpec} onChange={e => setPhdSpec(e.target.value)} style={{ ...inp, appearance: "auto" }}>
                              <option value="">اختر التخصص</option>
                              {currentPhdSpecs.map(s => <option key={s} value={s}>{s}</option>)}
                            </select>
                          )}
                          <input
                            type="text" value={phdYear}
                            onChange={e => setPhdYear(e.target.value)}
                            placeholder="سنة الدكتوراه (مثال: 1، 2، 3...)"
                            style={{ ...inp }}
                          />
                        </div>
                      )}
                    </div>
                  )}

                  {/* حقول الأستاذ */}
                  {userType === "teacher" && (<>
                    <div style={{ marginBottom: 11 }}>
                      <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: C.text, marginBottom: 5 }}>الرتبة العلمية</label>
                      <select value={grade} onChange={e => setGrade(e.target.value)} style={{ ...inp, appearance: "auto" }}>
                        <option value="">اختر رتبتك</option>
                        {teacherGrades.map(g => <option key={g} value={g}>{g}</option>)}
                      </select>
                    </div>
                    <div style={{ marginBottom: 11 }}>
                      <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: C.text, marginBottom: 5 }}>القسم</label>
                      <select value={dept} onChange={e => setDept(e.target.value)} style={{ ...inp, appearance: "auto" }}>
                        <option value="">اختر قسمك</option>
                        {["علوم التسيير", "العلوم التجارية", "العلوم المالية والمحاسبة", "العلوم الاقتصادية"].map(d => (
                          <option key={d} value={d}>{d}</option>
                        ))}
                      </select>
                    </div>
                  </>)}



                  {/* كلمة المرور + التأكيد */}
                  <div style={{ marginBottom: 11 }}>
                    <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: C.text, marginBottom: 5 }}>كلمة المرور</label>
                    <input type="password" value={pass} onChange={e => setPass(e.target.value)} placeholder="6 أحرف على الأقل" style={inp} />
                  </div>
                  <div style={{ marginBottom: 18 }}>
                    <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: C.text, marginBottom: 5 }}>تأكيد كلمة المرور</label>
                    <input type="password" value={passConf} onChange={e => setPassConf(e.target.value)}
                      placeholder="أعد كتابة كلمة المرور"
                      style={{ ...inp, borderColor: passConf && pass !== passConf ? C.red : passConf && pass === passConf ? "#16A34A" : C.border }} />
                    {passConf && pass !== passConf && <div style={{ fontSize: 11, color: C.red, marginTop: 4 }}>كلمتا المرور غير متطابقتين</div>}
                    {passConf && pass === passConf && pass.length >= 6 && <div style={{ fontSize: 11, color: "#16A34A", marginTop: 4 }}>✓ كلمتا المرور متطابقتان</div>}
                  </div>
                </>)}

                {err && <div style={{ color: C.red, fontSize: 12, marginBottom: 10, textAlign: "center", background: C.redBg, padding: "8px 12px", borderRadius: 8 }}>{err}</div>}
                {userType && (
                  <button onClick={handleRegister} style={{ ...btn(), width: "100%", padding: 13, fontSize: 15, background: `linear-gradient(135deg, ${C.primary} 0%, #1D4ED8 100%)`, boxShadow: "0 4px 15px rgba(30,58,138,.3)" }}>
                    إنشاء حساب ✅
                  </button>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─── SIDEBAR ──────────────────────────────────────────────────────────────
    function Sidebar({ active, setActive, user, onLogout }) {
      const [isDesktop, setIsDesktop] = React.useState(window.innerWidth > 900);
      React.useEffect(() => {
        const h = () => setIsDesktop(window.innerWidth > 900);
        window.addEventListener("resize", h);
        return () => window.removeEventListener("resize", h);
      }, []);
      const sections = [
        { label: "الرئيسية", items: [
          { id: "home",   icon: "🏠", label: "الرئيسية" },
          { id: "search", icon: "🔍", label: "ابحث عن مادتك", badge: "جديد" },
        ]},
        { label: "✨ التجربة الثلاثية", items: [
          { id: "triple", icon: "✨", label: "ثلاثة مرشدين — مسار واحد", badge: "قريباً" },
        ]},
        { label: "🎁 مجاني بالكامل", items: [
          { id: "why",      icon: "💡", label: "لماذا ندرس؟" },
          { id: "books",    icon: "📗", label: "الكتب الإلكترونية" },
          { id: "memcard",  icon: "🪪", label: "البطاقة الاحترافية" },
          { id: "problems", icon: "🏭", label: "بنك المشكلات", badge: "قريباً" },
        ]},
        { label: "🔓 مجاني بحدود", items: [
          { id: "questions", icon: "📝", label: "بنك الأسئلة" },
          { id: "refs",      icon: "📑", label: "تنسيق المراجع" },
          { id: "theses",    icon: "📚", label: "مذكرات التخرج" },
          { id: "translate", icon: "🌐", label: "الترجمة" },
          { id: "proofread", icon: "✍️", label: "التدقيق اللغوي" },
          { id: "session",   icon: "🎯", label: "إشكاليتك في جلسة", badge: "قريباً" },
        ]},
        { label: "👑 مميز — بلا حدود", items: [
          { id: "wallet", icon: "💰", label: "ترقية حسابي", badge: "PRO", customIcon: true },
        ]},
      ];
      return (
        <div style={{ width: isDesktop ? 260 : 230, minHeight: "100vh", background: `linear-gradient(180deg, ${C.primary} 0%, #1D4ED8 100%)`, display: "flex", flexDirection: "column", padding: "24px 0", flexShrink: 0, overflowY: "auto" }}>
          <div style={{ padding: "0 20px 20px", borderBottom: "1px solid rgba(255,255,255,.12)" }}>
            <div style={{ fontSize: 28, marginBottom: 4, filter: "drop-shadow(0 4px 8px rgba(0,0,0,.3))" }}>🎓</div>
            <div style={{ color: "white", fontWeight: 800, fontSize: 15 }}>رفيق الطالب</div>
            <div style={{ color: "rgba(255,255,255,.5)", fontSize: isDesktop ? 13 : 11 }}>{user?.name || "الطالب"} · {user?.spec || ""}</div>
          </div>
          <div style={{ display: "flex", gap: 8, padding: "12px 14px 6px" }}>
            <button onClick={() => setActive("profile")} style={{
              flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 5,
              padding: "12px 6px", borderRadius: 14,
              background: active === "profile" ? "rgba(255,255,255,.22)" : "rgba(255,255,255,.09)",
              border: active === "profile" ? "1.5px solid rgba(255,255,255,.45)" : "1.5px solid rgba(255,255,255,.13)",

    // ── دوال التنسيق ──────────────────────────────────────────────────────────
    function formatRef(ref, style) {
      const { type, lang, author, title, publisher, city, year, journal, vol, num, pages, url, accessed } = ref;
      const isAr = lang === "ar";
      const sep = isAr ? "." : ".";

      if (style === "APA") {
        if (type === "كتاب")
          return `${author} (${year})${sep} ${isAr ? title : `*${title}*`}${sep} ${city ? city + ": " : ""}${publisher}${sep}`;
        if (type === "مقال")
          return `${author} (${year})${sep} ${title}${sep} ${isAr ? `مجلة ${journal}` : `*${journal}*`}، ${vol}(${num})، ${pages}${sep}`;
        if (type === "موقع")
          return `${author} (${year})${sep} ${title}${sep} تم الاسترجاع ${accessed}، من ${url}`;
      }
      if (style === "MLA") {
        if (type === "كتاب")
          return `${author}. "${title}." ${publisher}, ${year}.`;
        if (type === "مقال")
          return `${author}. "${title}." ${journal}, vol. ${vol}, no. ${num}, ${year}, pp. ${pages}.`;
        if (type === "موقع")
          return `${author}. "${title}." ${url}. Accessed ${accessed}.`;
      }
      if (style === "Chicago") {
        if (type === "كتاب")
          return `${author}. ${title}. ${city ? city + ": " : ""}${publisher}, ${year}.`;
        if (type === "مقال")
          return `${author}. "${title}." ${journal} ${vol}, no. ${num} (${year}): ${pages}.`;
        if (type === "موقع")
          return `${author}. "${title}." Accessed ${accessed}. ${url}.`;
      }
      // ISO
      if (type === "كتاب")
        return `${author}. ${title}. ${city ? city + ": " : ""}${publisher}, ${year}.`;
      if (type === "مقال")
        return `${author}. ${title}. ${journal}, ${year}, vol. ${vol}, n° ${num}, p. ${pages}.`;
      if (type === "موقع")
        return `${author}. ${title} [en ligne]. Disponible sur: ${url} (consulté en ${accessed}).`;
    }

    const TYPE_ICONS = { "كتاب":"📚", "مقال":"📄", "موقع":"🌐" };

                  {/* المواد المتاحة أولاً */}
                  {deptFilter === "الكل" && !searchQ && (

                  {/* كل المواد مجمّعة حسب التخصص */}
                  <div style={{ fontSize:11, fontWeight:800, color:C.muted, marginBottom:8, display:"flex", alignItems:"center", gap:6 }}>

      // ─── شاشة مادة محددة ─────────────────────────────────────────────────
      return (
        <div>
          {/* رأس الصفحة */}
          <div style={{ marginBottom:20 }}>
            <button onClick={() => { setActiveSubj(null); setExpanded(null); }} style={{ background:"none", border:"none", cursor:"pointer", color:C.muted, fontSize:13, fontFamily:"inherit", display:"flex", alignItems:"center", gap:5, marginBottom:10, padding:0 }}>← العودة إلى المواد</button>
            <div style={{ background:`linear-gradient(135deg,${subj.color} 0%,${subj.color}CC 100%)`, borderRadius:16, padding:"16px 18px", color:"white" }}>
              <div style={{ fontSize:28, marginBottom:6 }}>{subj.icon}</div>
              <div style={{ fontWeight:800, fontSize:17, marginBottom:4 }}>{subj.subject}</div>

              <div style={{ display:"flex", gap:6, marginTop:10 }}>
                <a href={subj.driveLink} target="_blank" rel="noopener noreferrer"

          <div style={{ display:"flex", gap:0, marginBottom:16, background:C.bg, borderRadius:12, padding:4 }}>
            {["أسئلة","مواضيع"].map(tab => (
              <button key={tab} onClick={() => setActiveTab(tab)} style={{ flex:1, padding:"9px 0", borderRadius:9, border:"none", cursor:"pointer", fontFamily:"inherit", fontWeight:700, fontSize:13,

                {tab === "أسئلة" ? `📝 الأسئلة (${subj.questions.length})` : "📚 المواضيع الكاملة"}
              </button>
            ))}
          </div>

          {/* تبويب المواضيع الكاملة */}
          {activeTab === "مواضيع" && (
            <div>
              {/* ملخص المواضيع */}
              <div style={{ background:C.yellowBg, border:`1.5px solid #D97706`, borderRadius:12, padding:"10px 14px", marginBottom:14 }}>
                <p style={{ fontSize:12, color:C.yellow, margin:0 }}>📖 هذا القسم يجمع كل مواضيع المادة لمن يريد الاطلاع الشامل — مرتبة حسب الأهمية.</p>
              </div>
              {subj.fullTopics.map((topic, i) => (
                <div key={i} style={{ background:C.card, border:`1.5px solid ${C.border}`, borderRadius:12, padding:"12px 16px", marginBottom:10,
                  borderRight:`4px solid ${subj.color}` }}>
                  <div style={{ fontSize:13, color:C.text, lineHeight:1.7 }}>{topic}</div>
                </div>
              ))}

              {/* عارض الامتحانات الرسمية */}
              {subj.driveLink && (() => {
                // تحويل رابط Drive العادي إلى رابط embed
                const fileIdMatch = subj.driveLink.match(/\/d\/([^/]+)/);
                const fileId = fileIdMatch ? fileIdMatch[1] : null;
                const embedUrl = fileId
                  ? `https://drive.google.com/file/d/${fileId}/preview`
                  : null;
                return embedUrl ? (
                  <div style={{ marginTop:20 }}>
                    <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 }}>
                      <div style={{ fontSize:13, fontWeight:800, color:subj.color }}>📄 الامتحانات الرسمية</div>
                      <a href={subj.driveLink} target="_blank" rel="noopener noreferrer"
                        style={{ fontSize:11, fontWeight:700, color:subj.color, textDecoration:"none", background:subj.bg, border:`1.5px solid ${subj.color}44`, padding:"4px 10px", borderRadius:8 }}>
                        فتح في Drive ↗
                      </a>
                    </div>
                    <div style={{ borderRadius:14, overflow:"hidden", border:`1.5px solid ${subj.color}44`, boxShadow:`0 4px 16px ${subj.color}18` }}>
                      <iframe
                        src={embedUrl}
                        width="100%"
                        height="600"
                        allow="autoplay"
                        style={{ display:"block", border:"none" }}
                        title="الامتحانات الرسمية"
                      />
                    </div>
                    <p style={{ fontSize:11, color:C.muted, textAlign:"center", marginTop:8 }}>
                      إذا لم يظهر الملف — <a href={subj.driveLink} target="_blank" rel="noopener noreferrer" style={{ color:subj.color }}>افتحه مباشرة</a>
                    </p>
                  </div>
                ) : null;
              })()}
            </div>
          )}

          {/* تبويب الأسئلة */}
          {activeTab === "أسئلة" && (
            <div>
              {/* فلاتر */}
              <div style={{ marginBottom:14 }}>
                <div style={{ fontSize:11, fontWeight:700, color:C.muted, marginBottom:6 }}>نوع السؤال</div>
                <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:10 }}>
                  {typeOpts.map(t => (
                    <button key={t} onClick={() => setTypeFilter(t)} style={{ padding:"5px 11px", borderRadius:20, border:`1.5px solid ${typeFilter===t ? subj.color : C.border}`, background: typeFilter===t ? subj.color : "transparent", color: typeFilter===t ? "white" : C.text, fontSize:11, fontWeight:600, cursor:"pointer", fontFamily:"inherit" }}>{t}</button>
                  ))}
                </div>
                <div style={{ fontSize:11, fontWeight:700, color:C.muted, marginBottom:6 }}>الأولوية</div>
                <div style={{ display:"flex", gap:6 }}>
                  {["الكل","🔴","🟠","🟡"].map(p => (
                    <button key={p} onClick={() => setPrioFilter(p)} style={{ padding:"5px 11px", borderRadius:20, border:`1.5px solid ${prioFilter===p ? subj.color : C.border}`, background: prioFilter===p ? subj.color : "transparent", color: prioFilter===p ? "white" : C.text, fontSize:11, fontWeight:600, cursor:"pointer", fontFamily:"inherit" }}>{p === "الكل" ? "الكل" : p}</button>
                  ))}
                </div>
              </div>

              {/* النتائج */}
              <div style={{ fontSize:12, color:C.muted, fontWeight:600, marginBottom:10 }}>
                {filteredQs.length} سؤال
              </div>

              {filteredQs.map((q, i) => {
                const pc = priorityColor(q.priority);
                const isOpen = expanded === i;
                const repKey = `${activeSubj}-${i}`;
                return (
                  <div key={i} onClick={() => setExpanded(isOpen ? null : i)}
                    style={{ background:C.card, border:`1.5px solid ${isOpen ? subj.color : C.border}`, borderRadius:14, marginBottom:10, cursor:"pointer",
                      boxShadow: isOpen ? `0 4px 16px ${subj.color}22` : "none", transition:"all .15s" }}>
                    {/* header */}
                    <div style={{ padding:"12px 14px" }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8, marginBottom:8 }}>
                        <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
                          <span style={{ background:subj.bg, color:subj.color, fontSize:10, fontWeight:700, padding:"2px 8px", borderRadius:20 }}>{q.type}</span>
                          <span style={{ background:C.tag, color:C.muted, fontSize:10, padding:"2px 8px", borderRadius:20 }}>{q.years}</span>

                          <span style={{ fontSize:10, color:diffColor(q.diff), fontWeight:700, background:diffColor(q.diff)+"18", padding:"2px 7px", borderRadius:20 }}>{q.diff}</span>
                        </div>
                      </div>
                      <p style={{ fontSize:13, color:C.text, margin:0, lineHeight:1.75, whiteSpace:"pre-line" }}>{q.text}</p>
                    </div>

                    {/* expanded */}
                    {isOpen && (
                      <div style={{ borderTop:`1px solid ${C.border}`, padding:"10px 14px", background:C.bg, borderRadius:"0 0 14px 14px" }}>
                        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                          <span style={{ fontSize:12, color:C.muted }}>تكرر <strong style={{ color:C.primary }}>{q.repeat}x</strong> — آخرها {q.years.split("/").pop() || q.years}</span>
                          {reported[repKey] ? (
                            <span style={{ fontSize:11, color:"#16A34A", fontWeight:700 }}>✅ شكراً على الإبلاغ</span>
                          ) : (
                            <button onClick={e => handleReport(e, i)}
                              style={{ padding:"5px 11px", borderRadius:8, border:`1.5px solid ${C.border}`, background:"transparent", color:C.muted, fontSize:11, cursor:"pointer", fontFamily:"inherit" }}>
                              🚩 الإبلاغ عن خطأ
                            </button>
                          )}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    // ─── RESEARCH GUIDE (Socratic Mode) ──────────────────────────────────────
    function GuidePage({ setActive }) {
      const [topic,    setTopic]    = useState("");
      const [messages, setMessages] = useState([]); // [{role, text}]
      const [reply,    setReply]    = useState("");
      const [loading,  setLoading]  = useState(false);
      const [started,  setStarted]  = useState(false);
      const chatRef = useRef(null);

      useEffect(() => {
        if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
      }, [messages, loading]);

      const SYSTEM = `أنت مرشد بحث أكاديمي سقراطي متخصص في مناهج كليات الاقتصاد والتجارة والتسيير الجزائرية.
قاعدتك الذهبية المطلقة: لا تعطِ أي إجابة جاهزة، ولا تقترح زوايا، ولا تذكر مراجع، ولا تقدم حلولاً.
دورك الوحيد هو طرح سؤال واحد في كل رسالة — سؤال يجعل الطالب يفكر بنفسه ويكتشف المسار.
أسلوبك: موجز، دافئ، محفّز. لا تشرح، لا تعدّد، لا تُنظّر. سؤال واحد فقط في كل رد.
ابدأ بسؤال يكشف ما يعرفه الطالب عن موضوعه، ثم تدرّج نحو إشكاليته وحدوده ومنهجه — كل ذلك بالأسئلة فقط.
اكتب بالعربية دائماً.`;

      const buildHistory = (msgs) =>
        msgs.map(m => ({ role: m.role, content: m.text }));

      const startSession = async () => {
        if (!topic.trim()) return;
        setStarted(true);
        setLoading(true);
        setMessages([]);
        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1000,
              system: SYSTEM,
              messages: [{ role: "user", content: `موضوع بحثي هو: ${topic}` }],
            }),
          });
          const data = await res.json();
          const text = data.content?.map(b => b.text || "").join("") || "...";
          setMessages([
            { role: "user", text: `موضوعي: ${topic}` },
            { role: "assistant", text },
          ]);
        } catch {
          setMessages([{ role: "assistant", text: "حدث خطأ في الاتصال. حاول مجدداً." }]);
        }
        setLoading(false);
      };

      const sendReply = async () => {
        if (!reply.trim() || loading) return;
        const userMsg = { role: "user", text: reply.trim() };
        const newMsgs = [...messages, userMsg];
        setMessages(newMsgs);
        setReply("");
        setLoading(true);
        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1000,
              system: SYSTEM,
              messages: buildHistory(newMsgs),
            }),
          });
          const data = await res.json();
          const text = data.content?.map(b => b.text || "").join("") || "...";
          setMessages(prev => [...prev, { role: "assistant", text }]);
        } catch {
          setMessages(prev => [...prev, { role: "assistant", text: "حدث خطأ. حاول مجدداً." }]);
        }
        setLoading(false);
      };

      const reset = () => { setStarted(false); setTopic(""); setMessages([]); setReply(""); };

      return (
        <div>
          <PageHeader
            icon="🗂️"
            title="مرشد البحث"
            sub="يسألك — لا يجيب عنك. التفكير يبقى عندك."
            badge="مجاني"
          />

          {!started ? (
            <Card>
              <div style={{ background: C.yellowBg, border: `1px solid #D97706`, borderRadius: 10, padding: "10px 12px", marginBottom: 14 }}>
                <p style={{ fontSize: 12, color: C.yellow, margin: 0, lineHeight: 1.7 }}>
                  💡 المرشد لا يعطيك الإجابات — يطرح عليك أسئلة تساعدك تبني مسار بحثك بنفسك.
                </p>
              </div>
              <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: C.text, marginBottom: 7 }}>
                موضوع بحثك أو مذكرتك
              </label>
              <input
                value={topic}
                onChange={e => setTopic(e.target.value)}
                onKeyDown={e => e.key === "Enter" && startSession()}
                placeholder="مثال: التضخم في الجزائر، أو إدارة الجودة..."
                style={{ ...inp, marginBottom: 8 }}
              />
              <div style={{ fontSize: 12, color: C.muted, marginBottom: 12, display: "flex", alignItems: "center", gap: 6 }}>
                <span>📄</span>
                <span>بعد إدخال الموضوع ستظهر فوراً — بطاقات بحوث مشابهة من كليتنا</span>
              </div>
              <button onClick={startSession} style={{ ...btn(), width: "100%", padding: 12 }}>
                ابدأ الجلسة 🎯
              </button>
            </Card>
          ) : (
            <div>
              {/* Chat window */}
              <div ref={chatRef} style={{
                background: C.card,
                border: `1.5px solid ${C.border}`,
                borderRadius: 14,
                padding: 14,
                maxHeight: 420,
                overflowY: "auto",
                marginBottom: 12,
                display: "flex",
                flexDirection: "column",
                gap: 10,
              }}>
                {messages.map((m, i) => (
                  <div key={i} style={{
                    alignSelf: m.role === "user" ? "flex-start" : "flex-end",
                    maxWidth: "82%",
                    background: m.role === "user" ? C.primary : C.bg,
                    color: m.role === "user" ? "white" : C.text,
                    border: m.role === "assistant" ? `1.5px solid ${C.border}` : "none",
                    borderRadius: m.role === "user" ? "14px 14px 14px 4px" : "14px 14px 4px 14px",
                    padding: "10px 13px",
                    fontSize: 13,
                    lineHeight: 1.65,
                    whiteSpace: "pre-wrap",
                  }}>
                    {m.role === "assistant" && (
                      <div style={{ fontSize: 11, color: C.muted, marginBottom: 4, fontWeight: 700 }}>🗂️ المرشد</div>
                    )}
                    {m.text}
                  </div>
                ))}
                {loading && (
                  <div style={{
                    alignSelf: "flex-start",
                    background: C.bg,
                    border: `1.5px solid ${C.border}`,
                    borderRadius: "14px 14px 14px 4px",
                    padding: "10px 14px",
                    fontSize: 13,
                    color: C.muted,
                  }}>
                    ✍️ المرشد يفكر...
                  </div>
                )}
              </div>

          text:`🎉 أحسنتَ على إنهاء المراحل.\n\nأنا معك الآن كمساعد أكاديمي متخصص — أعرف مناهج كليتنا وأسئلة أساتذتنا، وأعرف بحثك بكل تفاصيله.\n\nما الذي تحتاجه الآن؟` },
        { role:"user", phase:3, text:"ما أسئلة أ. سليم بلقاسم في مادة الإدارة الاستراتيجية؟" },
        { role:"assistant", phase:3,
          text:`أ. سليم بلقاسم — الإدارة الاستراتيجية:\n\n🔄 الأسئلة الأكثر تكراراً:\n• «ناقش الاستراتيجيات العامة للتنافس لبورتر مع التطبيق على مؤسسة من اختيارك» — تكرر 3 مرات ⚠️\n• «ما مصادر الميزة التنافسية وكيف تحافظ عليها المؤسسة في بيئة متغيرة؟» — تكرر مرتين\n• «قارن بين استراتيجية قيادة التكلفة والتمايز مع ذكر شروط تطبيق كل منهما» — تكرر مرتين\n\n💡 ما يُميّز أ. سليم بلقاسم:\nيُقدّر الربط بين المثال التطبيقي والمفهوم النظري — إجابة بلا مثال عملي تخسر نقاطاً مهمة.\n\nالسؤال الذي سيطرحه على بحثك تحديداً سيكون على الأرجح:\n«انطلاقاً من نموذج بورتر، ناقش إمكانية الجمع بين استراتيجيتي قيادة التكلفة والتمايز مع تقديم مثال تطبيقي يدعم موقفك.»\n\nلديك الآن أمازون كمثال والمؤسسة الجزائرية كنقيض — إجابتك ستتجاوز إجابات زملائك لأنها تعترف بحدود النموذج لا تكتفي بشرحه.\n\nهل تريد أن نبني هيكل الإجابة معاً؟` },
      ];


      const [isDemo,      setIsDemo]      = useState(true);
      const [phase,        setPhase]       = useState(1);
      const [messages,     setMessages]    = useState([]);
      const [input,        setInput]       = useState("");
      const [loading,      setLoading]     = useState(false);
      const [userCount,    setUserCount]   = useState(0);
      const [showTrans,    setShowTrans]   = useState(false);
      const [nextPhase,    setNextPhase]   = useState(null);
      const [previewPhase, setPreviewPhase] = useState(null);
      const endRef = useRef(null);

      const PHASES = [
        { num:1, label:"مرشد البحث",     icon:"🗂️", color:"#1E3A8A", bg:"#EFF4FF", light:"#BFDBFE", border:"#93B4F0", desc:"يسألك — لا يجيب عنك",
          welcome:(n) => `أهلاً${n ? " "+n : ""}! أنا مرشدك البحثي 🗂️\n\nسأبني مسار بحثك معك عبر أسئلة تجعلك تفكر وتكتشف بنفسك.\n\nالسؤال الأول: ما موضوع بحثك أو مذكرتك؟` },
        { num:2, label:"القراءة الأكاديمية", icon:"📖", color:"#065F46", bg:"#ECFDF5", light:"#A7F3D0", border:"#6EE7B7", desc:"اقرأ بذكاء — لا بالكمية",
          welcome:()  => `ممتاز! انتقلنا لمرحلة القراءة الأكاديمية 📖\n\nالآن ابدأ بفتح أحد مراجعك.\n\nالسؤال: ما اسم المرجع الذي فتحته الآن؟` },
        { num:3, label:"المساعد الذكي",   icon:"🤖", color:"#6D28D9", bg:"#F5F3FF", light:"#DDD6FE", border:"#C4B5FD", desc:"متخصص في مناهج كليتك",
          welcome:(n,s) => `أحسنت على إنهاء المراحل 🎉\n\nأنا معك الآن كمساعد أكاديمي شامل — متخصص في:\n• مناهج كلية العلوم الاقتصادية والتجارية وعلوم التسيير\n• أسئلة الأساتذة وسياق الجامعة الجزائرية\n• تخصصك: ${s||"الاقتصاد"}\n\nما لا يعرفه ChatGPT — أنا أعرفه 🎯\n\nاسألني أي شيء!` },
      ];

      const PHASE_PREVIEW = {
        1: {
          subtitle: "يسألك — لا يجيب عنك. التفكير يبقى عندك.",
          tip: "💡 المرشد لا يعطيك الإجابات — يطرح عليك أسئلة تساعدك تبني مسار بحثك بنفسك.",
          features: [
            { icon:"🎯", title:"أدخل موضوع بحثك أو مذكرتك", body:"بعد إدخال الموضوع ستظهر فوراً بطاقات بحوث مشابهة من كليتنا 📋" },
            { icon:"🗂️", title:"بطاقات من أبحاث كليتك", body:"مذكرات حقيقية قريبة من موضوعك — مع الإشكالية والزاوية والمنهجية ونقاط الضعف" },
            { icon:"🔍", title:"يكشف الفجوة البحثية", body:"ما لم يُدرَس بعد في موضوعك — هذا هو قلب إشكاليتك الأصيلة" },
            { icon:"✅", title:"ينتهي بإشكالية محكمة", body:"إشكالية بنيتها أنت — ليست منقولة من أي بحث سابق، جاهزة للمرحلة التالية" },
          ],
        },
        2: {
          subtitle: "تقنيات كأساس — وما وراءها فن حقيقي",
          tip: "القراءة الحقيقية ليست استهلاكاً — هي حوار بينك وبين النص. هذه المهارات تميّز الباحث عن الحافظ.",
          features: [
            { icon:"🔭", title:"الاستطلاع الاستراتيجي", body:"تفحص هيكل الكتاب قبل أن تقرأ كلمة — الفهرس، العناوين الرئيسية، الخاتمة أولاً" },
            { icon:"🎭", title:"تعيين الأدوار", body:"كل مرجع له وظيفة محددة — نظري؟ تطبيقي؟ أرقام؟ الإشكالية تُملي الدور وليس العكس" },
            { icon:"🎯", title:"التنبؤ قبل القراءة", body:"سؤال + توقع + تحقق — تتعلم كيف يُفكر المؤلف، ليس فقط ماذا يقول" },
            { icon:"⚖️", title:"التمييز بين المثير والمفيد", body:"مثير للاهتمام ومفيد لبحثي ليسا نفس الشيء — الباحث المحترف يعرف متى يتوقف" },
            { icon:"🔀", title:"التركيب المتقاطع", body:"ابنِ موقفاً أصيلاً من مراجع متعارضة — أين يتفقون؟ أين يختلفون؟" },
            { icon:"🧪", title:"اختبار فاينمان", body:"اشرح الفكرة لشخص لا يعرف الموضوع — إذا لم تستطع الشرح ببساطة لم تفهم بعد" },
          ],
        },
        3: {
          subtitle: "متخصص في مناهج كليتك — ما لا يعرفه ChatGPT",
          tip: "أحسنت على إنهاء المراحل — الآن أنت باحث حقيقي 🎉",
          features: [
            { icon:"🏫", title:"متخصص في جامعتك", body:"يعرف مناهج كلية العلوم الاقتصادية والتجارية وعلوم التسيير — أسئلة الأساتذة وسياق الجامعة الجزائرية" },
            { icon:"📋", title:"أسئلة الامتحانات المتوقعة", body:"ما لا يعرفه ChatGPT — أسئلة متوقعة حسب مادتك وأستاذك وتخصصك" },
            { icon:"✍️", title:"مساعدة في الكتابة الأكاديمية", body:"خطة مذكرة، صياغة إشكالية، فصول نظرية وتطبيقية — كلها بالسياق الجزائري" },
            { icon:"🌟", title:"مفتوح بلا قيود بعد المسار", body:"أكملت مرشد البحث والقراءة الأكاديمية — الآن اسألني أي شيء في أي وقت" },
          ],
        },
      };

      const SYSTEMS = {
        1:`أنت مرشد بحث سقراطي لطلبة كليات الاقتصاد والتجارة والتسيير في الجزائر.
قاعدتك المطلقة: لا تعطِ إجابات جاهزة — فقط أسئلة تُحرّك تفكير الطالب.
اطرح سؤالاً واحداً فقط في كل رد. أسلوبك: موجز، دافئ، محفّز.
تدرّج: ما يعرفه الطالب → إشكاليته → حدوده → منهجه — كله بالأسئلة فقط.
اكتب بالعربية. لا تشرح، لا تعدد، لا تقترح. سؤال واحد فقط.`,
        2:`أنت مرشد القراءة الأكاديمية الانتقائية لطلبة الجامعة الجزائرية.
الطالب يقرأ مراجعه الآن. مهمتك:
1. اسأله عن المرجع الذي يقرأه وما يريد منه تحديداً
2. وجّهه للقراءة الذكية: الفهرس أولاً، الفصل المناسب، أول وآخر فقرة
3. اطلب منه أن يشرح ما فهمه بكلماته الخاصة
خطوة واحدة أو سؤال واحد في كل رد. اكتب بالعربية.`,
        3:`أنت مساعد أكاديمي متخصص لطلبة كلية العلوم الاقتصادية والتجارية وعلوم التسيير في الجزائر.
الطالب: ${firstName||"الطالب"}، تخصصه: ${spec}.
أجب بالعربية. كن محدداً وعملياً. أعطِ أمثلة من الواقع الجزائري دائماً.
تعرف: أسئلة الأساتذة الجزائريين، المناهج المحلية، المصطلحات، سياق الجامعة.
ما لا يعرفه ChatGPT — أنت تعرفه.`,
      };

      // Initialize demo mode
      useEffect(() => {
        if (isDemo) {
          setMessages(DEMO);
          // Set phase to last phase in demo
          setPhase(3);
        } else {
          const p = PHASES[0];
          setMessages([{ role:"assistant", text:p.welcome(firstName), phase:1, fromSys:true }]);
          setPhase(1);
          setUserCount(0);
          setShowTrans(false);
          setNextPhase(null);
        }
      }, [isDemo]);

      useEffect(() => {
        endRef.current?.scrollIntoView({ behavior:"smooth" });
      }, [messages, loading]);

      useEffect(() => {
        if (!isDemo) {
          if (phase === 1 && userCount >= 2 && !showTrans && !nextPhase) {
            setNextPhase(2); setShowTrans(true);
          } else if (phase === 2 && userCount >= 2 && !showTrans && !nextPhase) {
            setNextPhase(3); setShowTrans(true);
          }
        }
      }, [userCount, phase, isDemo]);

      const doTransition = () => {
        const np = nextPhase;
        const pInfo = PHASES[np - 1];
        setPhase(np); setUserCount(0); setShowTrans(false); setNextPhase(null);
        const wt = np === 3 ? pInfo.welcome(firstName, spec) : pInfo.welcome();
        setMessages(prev => [
          ...prev,
          { role:"system-transition", text:`انتقلت للمرحلة ${np}`, phase:np },
          { role:"assistant", text:wt, phase:np, fromSys:true },
        ]);
      };

      const send = async (textOverride) => {
        const msg = textOverride || input.trim();
        if (!msg || loading) return;
        setInput("");
        const userMsg = { role:"user", text:msg, phase };
        const newMsgs = [...messages, userMsg];
        setMessages(newMsgs);
        setUserCount(c => c + 1);
        setLoading(true);
        try {
          const apiMsgs = newMsgs
            .filter(m => !m.fromSys && m.role !== "system-transition" && (m.role === "user" || m.role === "assistant"))
            .map(m => ({ role:m.role, content:m.text }));
          const trimmed = apiMsgs[0]?.role === "assistant" ? apiMsgs.slice(1) : apiMsgs;
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({
              model:"claude-sonnet-4-20250514",
              max_tokens:1000,
              system: SYSTEMS[phase],
              messages: trimmed.length ? trimmed : [{ role:"user", content:msg }],
            }),
          });
          const data = await res.json();
          const reply = data.content?.map(b => b.text||"").join("") || "...";
          setMessages(prev => [...prev, { role:"assistant", text:reply, phase }]);
        } catch {
          setMessages(prev => [...prev, { role:"assistant", text:"حدث خطأ في الاتصال. حاول مجدداً.", phase }]);
        }
        setLoading(false);
      };

      // Current phase display info (for live mode)
      const livePh  = PHASES[phase - 1];

      const getMsgBubbleStyle = (m) => {
        const pInfo = PHASES[(m.phase||1) - 1];
        if (m.role === "user") return {
          background:pInfo.color, color:"white", border:"none",
          borderRadius:"14px 14px 14px 4px",
        };
        return {
          background:pInfo.bg, color:"#111827",
          border:`1.5px solid ${pInfo.border}`,
          borderRadius:"14px 14px 4px 14px",
        };
      };

      // ── Render ──────────────────────────────────────────────────────────────
      return (
        <div style={{ display:"flex", flexDirection:"column", height:"calc(100vh - 64px)" }}>

          {/* ── Header ── */}
          <div style={{ flexShrink:0, marginBottom:12 }}>
            <button onClick={() => setActive("home")} style={{
              background:"none", border:"none", cursor:"pointer", color:C.muted,
              fontSize:13, fontFamily:"inherit", display:"flex", alignItems:"center",
              gap:5, marginBottom:10, padding:0,
            }}>← الرئيسية</button>

            {/* Phase tabs — clickable for done/active, locked for future */}
            <div style={{ display:"flex", gap:6, marginBottom:10 }}>
              {PHASES.map(p => {
                const activePhase = isDemo ? 3 : phase;
                const isDone    = activePhase > p.num;
                const isCurrent = activePhase === p.num;
                const isLocked  = activePhase < p.num;
                const clickable = isDone || isCurrent;
                return (
                  <div key={p.num}
                    onClick={() => clickable && setPreviewPhase(p.num)}
                    style={{
                      flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:2,
                      padding:"8px 4px", borderRadius:12,
                      background: isCurrent ? p.bg : isDone ? p.bg+"88" : C.bg,
                      border:`2px solid ${isLocked ? C.border : p.color}`,
                      opacity: isLocked ? 0.42 : 1,
                      transition:"all .3s ease", position:"relative",
                      cursor: clickable ? "pointer" : "default",
                      boxShadow: isCurrent ? `0 2px 10px ${p.color}30` : "none",
                    }}>
                    {/* Icon */}
                    <span style={{ fontSize:16 }}>{isLocked ? "🔒" : p.icon}</span>
                    {/* Label */}
                    <span style={{
                      fontSize:9.5, fontWeight:800, textAlign:"center", lineHeight:1.2,
                      color: isLocked ? C.muted : p.color,
                    }}>{p.label}</span>
                    {/* Done checkmark */}
                    {isDone && (
                      <span style={{
                        position:"absolute", top:-6, left:-6,
                        background:p.color, color:"white", borderRadius:"50%",
                        width:16, height:16, display:"flex", alignItems:"center",
                        justifyContent:"center", fontSize:9, fontWeight:900,
                      }}>✓</span>
                    )}
                    {/* Current pulse bar */}
                    {isCurrent && (
                      <div style={{ position:"absolute", bottom:-3, width:24, height:3, background:p.color, borderRadius:2 }} />
                    )}
                    {/* Tap hint for done phases */}
                    {isDone && (
                      <span style={{ fontSize:8, color:p.color+"99", marginTop:1 }}>اضغط للعرض</span>
                    )}
                  </div>
                );
              })}
            </div>

            {/* ═══ Phase Preview Modal ═══ */}
            {previewPhase && PHASE_PREVIEW[previewPhase] && (
              <div style={{
                position:"fixed", inset:0, zIndex:9999,
                background:"rgba(0,0,0,0.6)", backdropFilter:"blur(4px)",
                display:"flex", alignItems:"flex-end", justifyContent:"center",
              }} onClick={() => setPreviewPhase(null)}>
                <div onClick={e => e.stopPropagation()} style={{
                  width:"100%", maxWidth:480,
                  background:"#fff", borderRadius:"20px 20px 0 0",
                  padding:"0 0 24px 0", maxHeight:"85vh", overflowY:"auto",
                }}>
                  {(() => {
                    const pp = PHASES[previewPhase - 1];
                    const pc = PHASE_PREVIEW[previewPhase];
                    const activePhase = isDemo ? 3 : phase;
                    return (
                      <div>
                        <div style={{
                          background:`linear-gradient(135deg, ${pp.color} 0%, ${pp.color}bb 100%)`,
                          borderRadius:"20px 20px 0 0", padding:"20px 20px 24px",
                          position:"relative", textAlign:"center",
                        }}>
                          <button onClick={() => setPreviewPhase(null)} style={{
                            position:"absolute", top:14, left:14,
                            background:"rgba(255,255,255,.2)", border:"none",
                            color:"white", borderRadius:"50%", width:30, height:30,
                            cursor:"pointer", fontSize:15, fontFamily:"inherit",
                          }}>✕</button>
                          <div style={{ fontSize:40, marginBottom:8 }}>{pp.icon}</div>
                          <div style={{ fontSize:18, fontWeight:900, color:"white", marginBottom:4 }}>{pp.label}</div>
                          <div style={{ fontSize:12, color:"rgba(255,255,255,.8)", marginBottom:10 }}>{pc.subtitle}</div>
                          <div style={{
                            display:"inline-flex", alignItems:"center", gap:6,
                            background:"rgba(255,255,255,.2)", borderRadius:20, padding:"4px 14px",
                          }}>
                            <span style={{ fontSize:11, color:"white", fontWeight:700 }}>
                              {activePhase > previewPhase ? "✅ مرحلة مكتملة" : "▶️ المرحلة الحالية"}
                            </span>
                          </div>
                        </div>
                        <div style={{ padding:"14px 14px 0" }}>
                          {pc.features.map((f, i) => (
                            <div key={i} style={{
                              display:"flex", gap:12, alignItems:"flex-start",
                              padding:"10px 12px", borderRadius:12, marginBottom:8,
                              background:pp.bg, border:`1px solid ${pp.border}`,
                            }}>
                              <span style={{ fontSize:20, flexShrink:0 }}>{f.icon}</span>
                              <div>
                                <div style={{ fontWeight:800, fontSize:13, color:pp.color, marginBottom:2 }}>{f.title}</div>
                                <div style={{ fontSize:11, color:"#6B7280", lineHeight:1.55 }}>{f.body}</div>
                              </div>
                            </div>
                          ))}
                          <div style={{
                            background:pp.bg, border:`1.5px solid ${pp.border}`,
                            borderRadius:12, padding:"10px 14px", marginBottom:14,
                          }}>
                            <span style={{ fontSize:14, marginLeft:6 }}>💬</span>
                            <span style={{ fontSize:12, color:pp.color, fontWeight:700, fontStyle:"italic" }}>{pc.tip}</span>
                          </div>
                          <button onClick={() => setPreviewPhase(null)} style={{
                            width:"100%", padding:"13px 0", borderRadius:14,
                            background:`linear-gradient(135deg, ${pp.color} 0%, ${pp.color}bb 100%)`,
                            color:"white", fontFamily:"inherit", fontSize:14,
                            fontWeight:800, border:"none", cursor:"pointer",
                          }}>العودة للمحادثة ←</button>
                        </div>
                      </div>
                    );
                  })()}
                </div>
              </div>
            )}

            {/* Demo banner OR live phase bar */}
            {isDemo ? (
              <div style={{
                background:"linear-gradient(135deg, #0F172A 0%, #1E3A8A 100%)",
                borderRadius:12, padding:"10px 14px",

              }}>

                  </div>
                </div>
                <button onClick={() => setIsDemo(false)} style={{
                  padding:"7px 14px", borderRadius:20, border:"1.5px solid rgba(255,255,255,.3)",
                  background:"rgba(255,255,255,.12)", color:"white", fontFamily:"inherit",
                  fontSize:11, fontWeight:800, cursor:"pointer", flexShrink:0,
                }}>
                  ابدأ محادثة حقيقية ←
                </button>
              </div>

              <div style={{
                background:livePh.bg, border:`1.5px solid ${livePh.border}`,

                display:"flex", alignItems:"center", gap:8,
              }}>
                <span style={{ fontSize:16 }}>{livePh.icon}</span>
                <div style={{ flex:1 }}>

                  <span style={{ fontSize:11, color:C.muted, marginRight:8 }}>— {livePh.desc}</span>
                </div>
                {phase < 3 && !showTrans && (
                  <span style={{ fontSize:10, color:C.muted, background:C.bg, padding:"2px 8px", borderRadius:10 }}>
                    {`${Math.max(0, 2 - userCount)} رد للانتقال`}
                  </span>
                )}
              </div>
            )}

            {/* Quick-start chips — live mode only, first message */}
            {!isDemo && messages.length === 1 && (
              <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginTop:8 }}>
                <span style={{ fontSize:11, color:C.muted, alignSelf:"center" }}>جرّب:</span>
                {["التضخم في الجزائر", "إدارة الجودة الشاملة TQM", "التمويل البنكي للمؤسسات الصغيرة"].map(t => (
                  <button key={t} onClick={() => send(t)} style={{
                    padding:"4px 10px", borderRadius:20, border:`1.5px solid ${C.border}`,
                    background:C.card, color:C.text, fontSize:11, cursor:"pointer", fontFamily:"inherit",
                  }}>{t}</button>
                ))}
              </div>
            )}

    // ─── PROOFREADING ─────────────────────────────────────────────────────────
    function ProofreadPage({ setActive }) {
      const FREE_LIMIT  = 500;
      const WARN_AT     = 420;

      const [tab,     setTab]     = useState("auto");   // "auto" | "human"
      const [text,    setText]    = useState("");
      const [result,  setResult]  = useState(null);
      const [loading, setLoading] = useState(false);
      const [copied,  setCopied]  = useState(false);
      const [section, setSection] = useState("errors");

      const wordCount = text.trim() ? text.trim().split(/\s+/).length : 0;
      const overLimit = wordCount > FREE_LIMIT;
      const nearLimit = wordCount >= WARN_AT && !overLimit;
      const pct       = Math.min(100, Math.round((wordCount / FREE_LIMIT) * 100));
      const barColor  = overLimit ? "#DC2626" : nearLimit ? "#F59E0B" : "#15803D";

      const doCheck = async () => {
        if (!text.trim() || overLimit || loading) return;
        setLoading(true);
        setResult(null);
        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1500,
              messages: [{
                role: "user",
                content:
`أنت مدقق لغوي أكاديمي متخصص في اللغة العربية الفصحى للبيئة الجامعية الجزائرية.

راجع النص التالي وأخرج ردك بالتنسيق الدقيق التالي حرفياً (لا تزد عليه):

===CORRECTED===
[النص المصحح كاملاً]

===ERRORS===
[كل خطأ في سطر منفصل بالتنسيق: نوع_الخطأ | الخطأ | التصحيح
حيث نوع الخطأ هو واحد من: إملائي | نحوي | أسلوبي | ترقيم
بحد أقصى 8 أخطاء، الأهم فالأهم]

===TIP===
[اقتراح أسلوبي واحد مختصر لتحسين جودة الكتابة الأكاديمية]

النص:
${text}`
              }],
            }),
          });
          const data = await res.json();
          const raw  = data.content?.[0]?.text || "";

          const getCSection = (tag) => {
            const re = new RegExp(`===${tag}===\\s*([\\s\\S]*?)(?====|$)`);
            const m  = raw.match(re);
            return m ? m[1].trim() : "";
          };

          const corrected = getCSection("CORRECTED");
          const errorsRaw = getCSection("ERRORS");
          const tip       = getCSection("TIP");

          const errors = errorsRaw
            ? errorsRaw.split("\n").filter(l => l.includes("|")).map(l => {
                const parts = l.split("|").map(s => s.trim());
                return { type: parts[0], wrong: parts[1], right: parts[2] };
              }).filter(e => e.wrong && e.right)
            : [];

          setResult({ corrected, errors, tip });
          setSection("errors");
        } catch {
          setResult({ corrected: "خطأ في الاتصال.", errors: [], tip: "" });
        }
        setLoading(false);
      };

      const doCopy = () => {
        navigator.clipboard?.writeText(result?.corrected || "");
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      };

      const tabStyle = (active) => ({
        flex: 1, padding: "10px 0", borderRadius: 10, border: "none",
        fontFamily: "inherit", fontWeight: 700, fontSize: 12, cursor: "pointer",
        background: active ? C.primary : "transparent",
        color: active ? "white" : C.muted,
        transition: "all .2s",
      });

              }}>
                <span style={{ letterSpacing:2 }}>{card.last4}</span>
                <span style={{ letterSpacing:4, opacity:.7 }}>••••</span>
                <span style={{ letterSpacing:4, opacity:.7 }}>••••</span>
                <span style={{ letterSpacing:4, opacity:.7 }}>••••</span>
              </div>

              {/* صف أسفل: EXPIRES + CARD HOLDER */}
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end" }}>
                <div>
                  <div style={{ fontSize:9, color:"rgba(255,255,255,.55)", letterSpacing:1.2, textTransform:"uppercase", marginBottom:2 }}>EXPIRES</div>
                  <div style={{ fontSize:14, fontWeight:700, color:"white" }}>{card.expiry}</div>
                </div>
                <div style={{ textAlign:"right" }}>
                  <div style={{ fontSize:9, color:"rgba(255,255,255,.55)", letterSpacing:1.2, textTransform:"uppercase", marginBottom:2 }}>CARD HOLDER</div>
                  <div style={{ fontSize:14, fontWeight:700, color:"white" }}>{userName}</div>
                </div>
              </div>
            </div>

            {/* ── ظهر البطاقة ── */}
            <div style={{
              position: "absolute", inset: 0, backfaceVisibility: "hidden",
              transform: "rotateY(180deg)",
              background: gradBack, borderRadius: 20,
              boxShadow: "0 12px 32px rgba(0,0,0,.35)",
              overflow: "hidden",
            }}>
              {/* الشريط الأسود */}
              <div style={{ width:"100%", height:44, background:"rgba(0,0,0,.8)", marginTop:24, marginBottom:16 }} />
              {/* شريط التوقيع */}
              <div style={{ margin:"0 20px", background:"#F5F5F0", borderRadius:4, padding:"8px 12px", display:"flex", justifyContent:"flex-end", alignItems:"center" }}>
                <div style={{ background:"white", border:"1px solid #ddd", borderRadius:4, padding:"4px 10px", fontFamily:"cursive", fontSize:13, color:"#333" }}>
                  {userName}
                </div>
              </div>
              <div style={{ margin:"12px 20px 0", fontSize:10, color:"rgba(255,255,255,.5)", textAlign:"center", lineHeight:1.6 }}>
                هذه البطاقة ملك لـ {card.type} — للإبلاغ عن فقدانها اتصل بخدمة العملاء
              </div>
            </div>
          </div>

          {/* زر قلب البطاقة + حذف */}
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:6, padding:"0 4px" }}>
            <button onClick={onDelete} style={{
              background:"none", border:"none", cursor:"pointer",
              fontSize:12, color:"#DC2626", opacity:.7, fontFamily:"inherit",
              padding:"4px 8px",
            }}>🗑️ حذف</button>
            <button onClick={onFlip} style={{
              background:"none", border:"none", cursor:"pointer",
              fontSize:12, color:C.muted, fontFamily:"inherit",
              padding:"4px 8px",
            }}>
              {flipped ? "← العودة للوجه" : "اضغط لرؤية الخلف ←"}
            </button>
          </div>
        </div>
      );
    }

              <BankCard
                key={card.id}
                card={card}
                userName={userName}
                flipped={flippedId === card.id}
                onFlip={() => setFlippedId(flippedId === card.id ? null : card.id)}

    // ─── SEARCH PAGE ──────────────────────────────────────────────────────────
    function SearchPage({ setActive, navigateToService }) {
      const [query, setQuery] = useState("");
      const [results, setResults] = useState([]);
      const [searched, setSearched] = useState(false);

      const normalize = (s) => s
        .replace(/[\u0640]/g, "")           // تشكيل وتطويل
        .replace(/[أإآا]/g, "ا")            // توحيد الهمزات والألف
        .replace(/[ةه]/g, "ه")              // ة → ه
        .replace(/[يى]/g, "ي")              // ى → ي
        .replace(/(^| )ال/g, "$1")          // حذف ال التعريف من بداية كل كلمة
        .replace(/\s+/g, " ")
        .trim();

      const doSearch = (q) => {
        const term = q.trim();
        if (!term) { setResults([]); setSearched(false); return; }
        setSearched(true);
        const normTerm = normalize(term);
        const found = SUBJECTS_DB.filter(s => {
          const nameMatch = normalize(s.name).includes(normTerm) || s.name.includes(term);
          const tagMatch  = s.tags.some(t => normalize(t).includes(normTerm) || t.includes(term));
          const deptMatch = normalize(s.dept).includes(normTerm) || s.dept.includes(term);
          const yearMatch = s.year.includes(term);
          return nameMatch || tagMatch || deptMatch || yearMatch;
        });
        setResults(found);
      };

      const handleChange = (e) => {
        const v = e.target.value;
        setQuery(v);
        doSearch(v);
      };

      // تجميع المواد حسب القسم والسنة
      const groupedSubjects = () => {
        const groups = {};
        SUBJECTS_DB.forEach(s => {
          const key = `${s.dept} — ${s.year}`;
          if (!groups[key]) groups[key] = [];
          groups[key].push(s);
        });
        return groups;
      };

      const levelColor = (year) => {
        if (year.includes("الأولى") || year.includes("أساسي")) return { bg:"#EFF4FF", color:"#1E3A8A" };
        if (year.includes("الثانية")) return { bg:"#ECFDF5", color:"#065F46" };
        if (year.includes("ليسانس")) return { bg:"#FEF3C7", color:"#92400E" };
        if (year.includes("ماستر 1")) return { bg:"#F5F3FF", color:"#6D28D9" };
        if (year.includes("ماستر 2")) return { bg:"#FEF2F2", color:"#991B1B" };
        return { bg:C.tag, color:C.muted };
      };

      return (
        <div>
          <PageHeader icon="🔍" title="ابحث عن مادتك" sub="اكتب اسم المادة أو كلمة مفتاحية" badge="مجاني" setActive={setActive} />

          {/* Search bar */}
          <div style={{ position:"relative", marginBottom:16 }}>
            <input
              autoFocus
              value={query}
              onChange={handleChange}
              placeholder="مثال: محاسبة، إحصاء، تسويق، جباية..."
              style={{ ...inp, paddingRight:42, fontSize:15, height:48 }}
            />
            <span style={{ position:"absolute", right:14, top:"50%", transform:"translateY(-50%)", fontSize:18 }}>🔍</span>
            {query && (
              <button onClick={() => { setQuery(""); setResults([]); setSearched(false); }}
                style={{ position:"absolute", left:12, top:"50%", transform:"translateY(-50%)",
                  background:"none", border:"none", fontSize:16, cursor:"pointer", color:C.muted }}>✕</button>
            )}
          </div>

          {/* Quick tags */}
          {!searched && (
            <div>
              <div style={{ fontSize:12, color:C.muted, fontWeight:700, marginBottom:10 }}>بحث سريع:</div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:7, marginBottom:20 }}>
                {["محاسبة","إحصاء","تسويق","جباية","مالية","إدارة","قانون","رياضيات","اقتصاد كلي","برمجة"].map(t => (
                  <button key={t} onClick={() => { setQuery(t); doSearch(t); }}
                    style={{ padding:"6px 14px", borderRadius:20, border:`1.5px solid ${C.border}`,
                      background:C.card, color:C.text, fontSize:12, fontWeight:600,
                      cursor:"pointer", fontFamily:"inherit" }}>{t}</button>
                ))}
              </div>
              {/* عرض كامل للمواد مقسمة */}
              <div style={{ marginBottom:10 }}>
                <div style={{ fontSize:12, color:C.muted, fontWeight:700, marginBottom:12 }}>
                  📚 كل المواد ({SUBJECTS_DB.length} مادة):
                </div>
                {Object.entries(groupedSubjects()).map(([groupKey, subjects]) => {
                  const lc = levelColor(subjects[0].year);
                  return (
                    <div key={groupKey} style={{ marginBottom:14 }}>
                      <div style={{ background:lc.bg, color:lc.color, fontSize:11, fontWeight:800,
                        padding:"5px 12px", borderRadius:20, display:"inline-block", marginBottom:8 }}>
                        {groupKey}
                      </div>
                      <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                        {subjects.map((s,i) => (
                          <button key={i} onClick={() => { setQuery(s.name); doSearch(s.name); }}
                            style={{ padding:"5px 12px", borderRadius:20, border:`1.5px solid ${C.border}`,
                              background:C.card, color:C.text, fontSize:12, fontWeight:600,
                              cursor:"pointer", fontFamily:"inherit" }}>
                            {s.name}
                          </button>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Results */}
          {searched && results.length === 0 && (
            <div style={{ textAlign:"center", padding:"40px 20px", color:C.muted }}>
              <div style={{ fontSize:36, marginBottom:12 }}>🔍</div>
              <div style={{ fontWeight:700, fontSize:15 }}>لا نتائج لـ "{query}"</div>
              <div style={{ fontSize:13, marginTop:6 }}>جرّب كلمة مختلفة</div>
            </div>
          )}

          {searched && results.length > 0 && (
            <div>
              <div style={{ fontSize:12, color:C.muted, fontWeight:600, marginBottom:12 }}>
                {results.length} مادة تطابق "{query}"
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
                {results.map((s, i) => {
                  const lc = levelColor(s.year);
                  return (
                    <div key={i} style={{ background:C.card, border:`1.5px solid ${C.border}`,
                      borderRadius:16, padding:16, boxShadow:"0 2px 8px rgba(30,58,138,.06)" }}>

                      {/* Header */}
                      <div style={{ marginBottom:12 }}>
                        <div style={{ fontWeight:800, fontSize:15, color:C.text, marginBottom:6 }}>{s.name}</div>
                        <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                          <span style={{ background:lc.bg, color:lc.color, fontSize:11, fontWeight:700,
                            padding:"3px 10px", borderRadius:20 }}>{s.year}</span>
                          <span style={{ background:C.tag, color:C.muted, fontSize:11,
                            padding:"3px 10px", borderRadius:20 }}>{s.dept}</span>
                          <span style={{ background:C.tag, color:C.muted, fontSize:11,
                            padding:"3px 10px", borderRadius:20 }}>{s.sem}</span>
                        </div>
                      </div>

                      {/* 5 action buttons */}
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:7 }}>
                        <button
                          onClick={() => navigateToService("questions", s.name)}
                          style={{ ...btn(), padding:"9px 0", fontSize:12, display:"flex",
                            alignItems:"center", justifyContent:"center", gap:5 }}>
                          📝 الأسئلة
                        </button>
                        <button onClick={() => navigateToService("why")}
                          style={{ ...btn("outline"), padding:"9px 0", fontSize:12, display:"flex",
                            alignItems:"center", justifyContent:"center", gap:5 }}>
                          💡 لماذا ندرس؟
                        </button>
                        <button onClick={() => navigateToService("theses")}
                          style={{ ...btn("outline"), padding:"9px 0", fontSize:12,
                            gridColumn:"span 2", display:"flex",
                            alignItems:"center", justifyContent:"center", gap:5 }}>
                          📚 مذكرات
                        </button>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      );
    }

        const reader = new FileReader();
        reader.onload = (ev) => {
          const b64 = ev.target.result;
          localStorage.setItem(avatarKey, b64);
          setAvatar(b64);
        };
        reader.readAsDataURL(file);
      };

      const removePhoto = () => {
        localStorage.removeItem(avatarKey);

            if (field === "spec") users[user.email].spec = specVal.trim();
