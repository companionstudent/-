              <button onClick={removePhoto} style={{ marginTop:10, background:"none", border:"none",
                color:"#EF4444", fontSize:11, cursor:"pointer", fontFamily:"inherit" }}>
                🗑️ حذف الصورة
              </button>
            )}
          </div>

          {/* رسالة الحفظ */}
          {saved && (
            <div style={{ background:"#ECFDF5", border:"1.5px solid #10B981", borderRadius:10,
              padding:"9px 14px", marginBottom:12, textAlign:"center",
              fontSize:13, color:"#065F46", fontWeight:700 }}>
              ✅ تم الحفظ بنجاح
            </div>
          )}

          {/* بيانات الحساب */}
          <div style={{ fontSize:12, fontWeight:800, color:C.muted, marginBottom:10,
            textTransform:"uppercase", letterSpacing:0.5 }}>📋 بيانات الحساب</div>

          {/* الاسم */}
          {infoRow("👤", "الاسم الكامل", user.name, true, editName, () => setEditName(true),
            <div style={{ display:"flex", gap:6 }}>
              <input value={nameVal} onChange={e => setNameVal(e.target.value)}
                style={{ ...inp, padding:"5px 8px", fontSize:12, flex:1 }} autoFocus />
              <button onClick={() => saveField("name")}
                style={{ ...btn(), padding:"5px 12px", fontSize:11 }}>حفظ</button>
              <button onClick={() => { setEditName(false); setNameVal(user.name); }}
                style={{ ...btn("outline"), padding:"5px 10px", fontSize:11 }}>✕</button>
            </div>
          )}

          {/* البريد */}
          {infoRow("📧", "البريد الجامعي", user.email, false, false, null, null)}

          {/* التخصص */}
          {infoRow("🎓", "المسار الدراسي", user.spec, true, editSpec, () => setEditSpec(true),
            <div style={{ display:"flex", gap:6 }}>
              <input value={specVal} onChange={e => setSpecVal(e.target.value)}
                style={{ ...inp, padding:"5px 8px", fontSize:12, flex:1 }} autoFocus />
              <button onClick={() => saveField("spec")}
                style={{ ...btn(), padding:"5px 12px", fontSize:11 }}>حفظ</button>
              <button onClick={() => { setEditSpec(false); setSpecVal(user.spec); }}
                style={{ ...btn("outline"), padding:"5px 10px", fontSize:11 }}>✕</button>
            </div>
          )}

          {/* نوع الحساب */}
          {infoRow("🏷️", "نوع الحساب", `${roleIcon} ${roleLabel}`, false, false, null, null)}

          {/* الرتبة للأستاذ */}
          {user.role === "teacher" && userData.grade &&
            infoRow("🏫", "الرتبة الأكاديمية", userData.grade, false, false, null, null)}

          {/* إعدادات إضافية */}
          <div style={{ fontSize:12, fontWeight:800, color:C.muted, margin:"18px 0 10px",
            textTransform:"uppercase", letterSpacing:0.5 }}>⚙️ الحساب والإعدادات</div>

          <div onClick={() => setActive("language")} style={{ display:"flex", alignItems:"center", gap:12,
            padding:"12px 14px", background:C.card, border:`1.5px solid ${C.border}`,
            borderRadius:12, marginBottom:8, cursor:"pointer" }}>
            <span style={{ fontSize:20 }}>🌐</span>
            <div style={{ flex:1 }}>

              <div style={{ fontSize:11, color:C.muted }}>العربية (الافتراضية)</div>
            </div>
            <span style={{ fontSize:12, color:C.muted }}>←</span>
          </div>

    // ─── LANGUAGE PAGE ────────────────────────────────────────────────────────
    function LanguagePage({ setActive }) {
      const langs = [
        { code:"ar", label:"العربية", native:"عربي", icon:"🇩🇿", active:true,  desc:"اللغة الافتراضية للتطبيق" },
        { code:"fr", label:"Français", native:"فرنسية", icon:"🇫🇷", active:false, desc:"قريباً — قيد التطوير" },
        { code:"en", label:"English",  native:"إنجليزية", icon:"🇬🇧", active:false, desc:"قريباً — قيد التطوير" },
      ];
      return (
        <div>
          <div style={{ marginBottom:22 }}>
            <button onClick={() => setActive("home")} style={{ background:"none", border:"none", cursor:"pointer", color:C.muted, fontSize:13, fontFamily:"inherit", display:"flex", alignItems:"center", gap:5, marginBottom:12, padding:0 }}>
              ← الرئيسية
            </button>
            <h2 style={{ fontSize:20, fontWeight:800, color:C.primary, margin:"0 0 4px", display:"flex", alignItems:"center", gap:8 }}>
              🌐 لغة التطبيق
            </h2>
            <p style={{ color:C.muted, fontSize:13, margin:0 }}>اختر لغة واجهة التطبيق</p>
          </div>

          <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
            {langs.map(lang => (
              <div key={lang.code} style={{
                background: lang.active ? C.card : "#F8FAFF",
                border: `2px solid ${lang.active ? C.primary : C.border}`,
                borderRadius:16, padding:"18px 20px",
                display:"flex", alignItems:"center", gap:14,
                opacity: lang.active ? 1 : 0.6,
                cursor: lang.active ? "default" : "not-allowed",
                position:"relative", overflow:"hidden",
              }}>
                {/* شارة "مفعّل" أو "قريباً" */}
                <div style={{
                  position:"absolute", top:12, left:14,
                  background: lang.active ? "#16A34A" : "#9CA3AF",
                  color:"white", fontSize:10, fontWeight:800,
                  padding:"2px 9px", borderRadius:20,
                }}>
                  {lang.active ? "✓ مفعّل" : "قريباً"}
                </div>

                <div style={{ fontSize:32 }}>{lang.icon}</div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:16, fontWeight:800, color: lang.active ? C.primary : C.muted }}>
                    {lang.label}
                    <span style={{ fontSize:12, color:C.muted, fontWeight:400, marginRight:8 }}>({lang.native})</span>
                  </div>
                  <div style={{ fontSize:12, color:C.muted, marginTop:3 }}>{lang.desc}</div>
                </div>
                {lang.active && (
                  <div style={{ width:20, height:20, borderRadius:"50%", background:C.primary, display:"flex", alignItems:"center", justifyContent:"center" }}>
                    <div style={{ width:8, height:8, borderRadius:"50%", background:"white" }} />
                  </div>
                )}
              </div>
            ))}
          </div>

          <div style={{ marginTop:22, background:C.yellowBg, border:`1.5px solid #FCD34D`, borderRadius:14, padding:"14px 16px" }}>
            <div style={{ fontSize:13, fontWeight:700, color:C.yellow, marginBottom:4 }}>💡 ملاحظة</div>
            <div style={{ fontSize:12, color:C.yellow, lineHeight:1.6 }}>
              التطبيق يدعم العربية حالياً — الفرنسية والإنجليزية قيد التطوير وستتوفران في إصدار قادم.
            </div>
          </div>
        </div>
      );
    }

    // ─── APP ──────────────────────────────────────────────────────────────────
    function App() {
      const [user,        setUser]        = useState(null);
      const [onboarded,   setOnboarded]   = useState(false);
      const [active,      setActive]      = useState("home");
      const [drawerOpen,  setDrawerOpen]  = useState(false);
      const [initSubject, setInitSubject] = useState(null); // تمرير المادة من البحث لبنك الأسئلة
      const [isDesktop, setIsDesktop] = React.useState(window.innerWidth > 900);
      React.useEffect(() => {
        const h = () => setIsDesktop(window.innerWidth > 900);
        window.addEventListener("resize", h);
        return () => window.removeEventListener("resize", h);
      }, []);

      const navigate = (id) => { setActive(id); setDrawerOpen(false); };
      // navigateToService: تُستخدم من SearchPage لتمرير اسم المادة للخدمة المقصودة
      const navigateToService = (page, subjectName = null) => {
        if (subjectName) setInitSubject(subjectName);
        navigate(page);
      };
      const handleLogout = () => { setUser(null); setOnboarded(false); setActive("home"); };

      if (!user) return <LoginPage onLogin={(u) => setUser(u)} />;
      if (!onboarded) return <OnboardingPage user={user} onDone={() => setOnboarded(true)} />;

      const pages = {
        home:      <HomePage setActive={navigate} user={user} />,
        search:    <SearchPage setActive={navigate} navigateToService={navigateToService} />,
        triple:    <TripleChatPage user={user} setActive={navigate} />,
        why:       <WhyPage setActive={navigate} />,
        refs:      <RefsPage setActive={navigate} />,
        questions: <QuestionsPage setActive={navigate} user={user} initSubject={initSubject} onClearInit={() => setInitSubject(null)} />,
        guide:     <GuidePage setActive={navigate} />,
        theses:    <ThesesPage setActive={navigate} />,
        reading:   <ReadingPage setActive={navigate} />,
        memcard:   <MemCardPage setActive={navigate} />,
        ai:        <AIPage user={user} setActive={navigate} />,
        translate: <TranslatePage setActive={navigate} />,
        proofread: <ProofreadPage setActive={navigate} />,
        books:     <BooksPage setActive={navigate} user={user} />,
        wallet:    <WalletPage setActive={navigate} user={user} />,
        problems:  <ProblemsPage setActive={navigate} />,
        session:   <SessionPage setActive={navigate} />,
        language:  <LanguagePage setActive={navigate} />,
        profile:   <ProfilePage user={user} setUser={setUser} setActive={navigate} />,
      };

      const pageLabels = {
        home:"الرئيسية", search:"بحث المواد", triple:"التجربة الثلاثية", why:"لماذا ندرس؟",
        refs:"تنسيق المراجع", questions:"بنك الأسئلة", guide:"مرشد البحث",
        theses:"مذكرات التخرج", reading:"فن القراءة الأكاديمية",
        memcard:"البطاقة الاحترافية", ai:"المساعد الذكي", translate:"الترجمة",
        proofread:"التدقيق اللغوي", books:"الكتب الإلكترونية", wallet:"محفظتي",
        problems:"بنك المشكلات", session:"إشكاليتك في جلسة", language:"لغة التطبيق",
        profile:"ملفي الشخصي",
      };

      return (
        <div style={{ display: "flex", minHeight: "100vh", background: C.bg, fontFamily: "'Segoe UI',Tahoma,Geneva,Verdana,sans-serif", direction: "rtl" }}>

          {/* Desktop sidebar */}
          <div className="desktop-sidebar">
            <Sidebar active={active} setActive={navigate} user={user} onLogout={handleLogout} />
          </div>

          {/* Mobile overlay */}
          <div className={"sidebar-overlay" + (drawerOpen ? " open" : "")} onClick={() => setDrawerOpen(false)} />
          <div className={"sidebar-drawer" + (drawerOpen ? " open" : "")}
               style={{ background: "linear-gradient(180deg,#1E3A8A 0%,#1D4ED8 100%)" }}>
            <Sidebar active={active} setActive={navigate} user={user} onLogout={handleLogout} />
          </div>

          {/* Main */}
          <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0 }}>
            {/* Mobile top bar */}
            <div className="mob-topbar">
              <span>🎓 {pageLabels[active] || "رفيق الطالب"}</span>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <button
                  onClick={() => navigate("search")}
                  style={{
                    background: active === "search" ? "rgba(255,255,255,.25)" : "rgba(255,255,255,.12)",
                    border: "1.5px solid rgba(255,255,255,.3)",
                    borderRadius: 9, color: "white",
                    fontSize: 14, cursor: "pointer",
                    padding: "5px 11px", fontFamily: "inherit",
                    display:"flex", alignItems:"center", gap:5,
                  }}
                >
                  🔍 <span style={{ fontSize:12, fontWeight:700 }}>بحث</span>
                </button>
                <button onClick={() => setDrawerOpen(true)}>☰</button>
              </div>
            </div>

            <main className="main-content" style={{ flex: 1, padding: isDesktop ? "36px 48px" : "28px 28px", overflowY: "auto", maxWidth: isDesktop ? 980 : 700 }}>
              {pages[active] || pages.home}
            </main>
          </div>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
